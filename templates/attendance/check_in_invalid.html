{% load i18n static %}<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE }}" dir="{% if IS_RTL %}rtl{% else %}ltr{% endif %}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% trans "Check-in unavailable" %}</title>
  <link rel="stylesheet" href="{% static 'css/app.css' %}?v=2">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/feather-icons/4.29.0/feather.min.js" defer></script>
</head>
<body>
<div class="checkin-page">
  <div class="checkin-card text-center">
    <div style="width:72px;height:72px;border-radius:50%;background:var(--color-danger-100);color:var(--color-danger-700);display:grid;place-items:center;margin:0 auto 18px;">
      <i data-feather="alert-octagon" style="width:36px;height:36px;"></i>
    </div>
    <h1 style="font-size:20px; font-weight:800; color:var(--color-slate-900);">{% trans "Cannot check in" %}</h1>
    <p class="cell-secondary mt-2">{{ error }}</p>
    {% if session %}
      <div class="cell-secondary mt-3">{% trans "Session" %}: {{ session.title }}</div>
    {% endif %}
  </div>
</div>
<script>document.addEventListener('DOMContentLoaded', () => feather.replace());</script>
</body>
</html>
