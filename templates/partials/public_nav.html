{% load i18n %}
<nav class="public-nav" x-data="{ open: false }"
     @keydown.escape.window="open = false"
     @click.outside="open = false">
  <div class="public-container public-nav-inner">
    <a href="{% url 'landing' %}" class="public-brand" @click="open = false">
      <span class="public-brand-mark">✝</span>
      <span class="public-brand-text">
        <span class="public-brand-title">{% trans "Boys Center" %}</span>
        <span class="public-brand-sub">{% trans "Sports & Faith" %}</span>
      </span>
    </a>

    <div class="public-nav-links" :class="{ 'open': open }">
      <a href="{% url 'landing' %}" class="public-nav-link" @click="open = false">{% trans "Home" %}</a>
      <a href="{% url 'news:list' %}" class="public-nav-link" @click="open = false">{% trans "News" %}</a>
      <a href="{% url 'events:list' %}" class="public-nav-link" @click="open = false">{% trans "Events" %}</a>
      <a href="{% url 'ratings:index' %}" class="public-nav-link" @click="open = false">⭐ {% trans "Rate us" %}</a>

      <button type="button"
              class="public-nav-icon-btn theme-toggle"
              @click="toggleTheme()"
              :aria-label="theme === 'dark' ? '{% trans "Light mode" %}' : '{% trans "Dark mode" %}'"
              :title="theme === 'dark' ? '{% trans "Light mode" %}' : '{% trans "Dark mode" %}'">
        <svg x-show="theme === 'dark'" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg x-show="theme !== 'dark'" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>

      <form action="{% url 'set_language' %}" method="post" style="display:inline-flex;gap:0;margin:0;">
        {% csrf_token %}
        {% if request.path|slice:":3" == '/en' %}
          <input type="hidden" name="next" value="/ar{{ request.path|slice:'3:' }}">
          <button type="submit" name="language" value="ar" class="public-nav-icon-btn" title="العربية" style="width:auto;padding:0 12px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            <span class="hide-sm" style="font-size:12px;margin-inline-start:6px;">عربي</span>
          </button>
        {% else %}
          <input type="hidden" name="next" value="/en{{ request.path|slice:'3:' }}">
          <button type="submit" name="language" value="en" class="public-nav-icon-btn" title="English" style="width:auto;padding:0 12px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
            <span class="hide-sm" style="font-size:12px;margin-inline-start:6px;">EN</span>
          </button>
        {% endif %}
      </form>

      <a href="{% url 'login' %}" class="btn btn-primary btn-sm" @click="open = false">{% trans "Sign in" %}</a>
    </div>

    <button type="button" class="public-nav-toggle burger-btn"
            :class="{ 'is-active': open }"
            @click.stop="open = !open"
            :aria-expanded="open"
            aria-label="{% trans 'Menu' %}">
      <span class="burger-box" aria-hidden="true">
        <span class="burger-line burger-line-top"></span>
        <span class="burger-line burger-line-mid"></span>
        <span class="burger-line burger-line-bot"></span>
      </span>
    </button>
  </div>
</nav>
