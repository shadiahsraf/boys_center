<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>غير متصل · سنتر الأولاد</title>
  <link rel="icon" type="image/svg+xml" href="/static/img/bc-icon.svg">
  <style>
    *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Cairo', system-ui, sans-serif;
      background: linear-gradient(180deg, #1A0F0F 0%, #2A1515 100%);
      color: #ffffff;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
    }
    .card {
      max-width: 380px;
      padding: 36px 28px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(212,175,55,0.18);
      border-radius: 20px;
      backdrop-filter: blur(8px);
    }
    .icon {
      font-size: 56px;
      margin-bottom: 14px;
      filter: drop-shadow(0 4px 14px rgba(212,175,55,0.4));
    }
    h1 { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
    p  { color: rgba(255,255,255,0.7); font-size: 14.5px; line-height: 1.65; }
    button {
      margin-top: 22px;
      padding: 11px 22px;
      background: linear-gradient(135deg, #D4AF37, #b8962e);
      color: #1A0F0F;
      border: none;
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(212,175,55,0.32);
    }
    button:hover { transform: translateY(-1px); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>أنت غير متصل بالإنترنت</h1>
    <p>تأكد من اتصالك بالشبكة وحاول مرة أخرى.<br>الصفحات التي زرتها سابقاً متاحة بدون اتصال.</p>
    <button onclick="window.location.reload()">إعادة المحاولة</button>
  </div>
</body>
</html>
